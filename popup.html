<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VTS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 84px;
      height: 36px;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .leds {
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .led-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s, transform 0.12s;
      background: #222;
      box-shadow: inset 0 2px 3px rgba(0,0,0,0.7),
                  inset 0 -1px 1px rgba(255,255,255,0.03),
                  0 1px 1px rgba(0,0,0,0.4);
    }
    .led-dot:hover {
      background: #2a2a2a;
      box-shadow: inset 0 2px 3px rgba(0,0,0,0.7),
                  inset 0 -1px 1px rgba(255,255,255,0.05),
                  0 1px 2px rgba(0,0,0,0.4);
    }
    .led-dot:active { transform: scale(0.85); }

    #ledThumb.on {
      background: radial-gradient(circle at 40% 35%, #fff 0%, #93c5fd 40%, #60a5fa 70%);
      box-shadow: 0 0 10px 3px rgba(96,165,250,0.28),
                  inset 0 0 3px rgba(255,255,255,0.2),
                  0 2px 3px rgba(0,0,0,0.3);
    }
    #ledMacro.on {
      background: radial-gradient(circle at 40% 35%, #fff 0%, #86efac 40%, #4ade80 70%);
      box-shadow: 0 0 10px 3px rgba(74,222,128,0.22),
                  inset 0 0 3px rgba(255,255,255,0.2),
                  0 2px 3px rgba(0,0,0,0.3);
    }

    @media (prefers-color-scheme: light) {
      body { background: #eee; }
      .led-dot {
        background: #d0d0d0;
        box-shadow: inset 0 2px 3px rgba(0,0,0,0.12),
                    inset 0 -1px 1px rgba(255,255,255,0.3),
                    0 1px 1px rgba(0,0,0,0.1);
      }
      .led-dot:hover { background: #c8c8c8; }
    }
  </style>
</head>
<body>
  <div class="leds">
    <div class="led-dot" id="ledThumb"></div>
    <div class="led-dot" id="ledMacro"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
