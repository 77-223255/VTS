<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>VTS</title>
  <style>
    /* popup styles v1.2.0 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      background: rgba(10, 10, 10, 0.85);   
      font: 13px/1.4 "PingFang SC", "Microsoft YaHei", 
"Noto Sans SC", -apple-system, BlinkMacSystemFont, 
'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }
    
    .option {
      width: 100%;
      cursor: pointer;
      position: relative;
      user-select: none;
      overflow: hidden;
      text-align: center;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.12);
    }
    
    .option-img {
      position: absolute;
      inset: -1px;
      background-image: url('images/demo.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }
    
    .option-text {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 10;
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    #optThumb {
      height: 60px;
    }
    #optThumb .option-text {
      top: 50%;
      transform: translateY(-50%);
    }
    #optThumb.on .option-img { opacity: 1; }
    #optThumb.on .option-text { color: #f0e8e0; }
    #optThumb:not(.on) .option-text { color: #666; }
    
    #optPreview {
      height: 60px;
      transition: height 0.3s ease;
    }
    #optPreview.on {
      height: 150px;
    }
    #optPreview .option-text {
      top: 50%;
      transform: translateY(-50%);
    }
    #optPreview.on .option-img { opacity: 1; }
    #optPreview:not(.on) .option-text { color: #666; }
    #optPreview.on .option-text { color: #f0e8e0; }
    
    .unsupported-view { display: none; position: fixed; inset: 0;
z-index: 100; background: rgba(0,0,0,0.5);
backdrop-filter: blur(8px); 
-webkit-backdrop-filter: blur(8px); 
flex-direction: column; align-items: center; 
    justify-content: center; font-size: 48px; color: rgba(255,255,255,0.6); }
    body.unsupported .unsupported-view { display: flex; }
    body.unsupported .settings-view { opacity: 0.5; pointer-events: none; }
    
    @media (prefers-color-scheme: light) {
      body { background: rgba(245, 245, 245, 0.7);
color: #1a1a1a; }
      .option { border-bottom: 0.5px solid rgba(0, 0, 0, 0.1); }
      #optThumb:not(.on) .option-text { color: #999; }
      #optPreview:not(.on) .option-text { color: #999; }
      .unsupported-view { background: rgba(255,255,255,0.5); color: rgba(0,0,0,0.4); }
    }
  </style>
</head>
<body>
  <div class="settings-view">
  <div class="option" id="optThumb">
    <div class="option-img"></div>
    <div class="option-text">O_O</div>
  </div>
  <div class="option" id="optPreview">
    <div class="option-img"></div>
    <div class="option-text">O_O</div>
  </div>
  </div>
  <div class="unsupported-view">x_x</div>
  <script src="popup.js"></script>
</body>
</html>
